name: EasyKits

version: 1.0

main: com.gamercorpse.easykits.EasyKits

api-version: '1.21'

folia-supported: true

authors:
  - Gamercorpse

commands:

  easykits:
    description: Main EasyKits command
    aliases:
      - ekits
      - kits

permissions:

  easykits.admin:
    default: op
    description: admin access
  easykits.kit.edit:
    description: Allows editing kits through the in-game editor
    default: op
  easykits.use:
    default: true
    description: default permission